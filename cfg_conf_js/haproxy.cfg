# // CONFIGURATION XTR LOADBALANCER

global       
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 1d

    tune.h2.initial-window-size 2147483647
    tune.ssl.default-dh-param 2048

    pidfile /run/haproxy.pid
    chroot /var/lib/haproxy

    user haproxy
    group haproxy
    daemon

    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    ssl-default-bind-options no-sslv3 no-tlsv10 no-tlsv11

defaults
    log global
    mode tcp
    option dontlognull
    option tcp-smart-connect
    timeout connect 5s
    timeout client  24h
    timeout server  24h
    option clitcpka
    option srvtcpka

# ===============================
# FRONTEND 443 (ENTRY)
# ===============================
frontend multiport
    mode tcp
    bind *:443 tfo

    tcp-request inspect-delay 500ms
    tcp-request content accept if HTTP
    tcp-request content accept if { req.ssl_hello_type 1 }

    use_backend recir_http if HTTP 
    default_backend recir_https

# ===============================
# FRONTEND LOOP HTTP
# ===============================
frontend multiports
    mode tcp
    bind abns@haproxy-http accept-proxy tfo
    default_backend recir_https_www

# ===============================
# FRONTEND MAIN (SSL / WS / gRPC)
# ===============================
frontend ssl
    mode tcp
    bind *:80 tfo
    bind *:8080 tfo 
    bind abns@haproxy-https accept-proxy ssl crt /etc/haproxy/hap.pem alpn h2,http/1.1 tfo

    tcp-request inspect-delay 500ms
    tcp-request content capture req.ssl_sni len 100
    tcp-request content accept if { req.ssl_hello_type 1 }

    # 🔥 ACL
    acl is_ws hdr(Upgrade) -i websocket
    acl is_upgrade hdr(Connection) -i upgrade
    acl is_grpc ssl_fc_alpn -i h2
    acl is_ssh payload(0,7) -m bin 5353482d322e30

    # 🔁 ROUTING
    use_backend GRUP_XTR if is_grpc
    use_backend XTR_VPN if is_ws is_upgrade
    use_backend BOT_XTR if is_ssh
    default_backend CHANNEL_XTR

# ===============================
# BACKENDS
# ===============================

backend recir_https_www
    mode tcp
    server ssh 127.0.0.1:2223 check
     
backend XTR_VPN
    mode tcp
    option tcp-check
    server nginx_ws 127.0.0.1:1010 send-proxy check 

backend GRUP_XTR
    mode tcp
    option tcp-check
    server nginx_grpc 127.0.0.1:1013 send-proxy check
    
backend CHANNEL_XTR
    mode tcp
    balance roundrobin
    server ovpn 127.0.0.1:1194 check
    server ovpn_ws 127.0.0.1:1012 send-proxy check

backend BOT_XTR
    mode tcp
    server dropbear 127.0.0.1:2222 check
    
backend recir_http
    mode tcp
    server loop_http abns@haproxy-http send-proxy-v2 check
    
backend recir_https
    mode tcp
    server loop_https abns@haproxy-https send-proxy-v2 check